  * { box-sizing: border-box; }

    color: #5A7A95;

    align-items: center;
  }
  h1 {

    letter-spacing: 4px;
    margin: 0 0 8px 0;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.7;
    margin-bottom: 32px;
  }

  .map-container {
    position: relative;
    width: 100%;
    max-width: 720px;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(90, 122, 149, 0.15);
  }
  #map { width: 100%; height: 100%; }

  .maplibregl-ctrl-attrib {
    font-family: Georgia, serif;
    font-size: 10px;
  }

  /* The element MapLibre uses for each marker */
  .price-marker {
    width: 70px;
    cursor: pointer;
    transition: transform 0.2s ease;
    transform-origin: 50% 85%;
    position: relative;
  }
  .price-marker:hover {
    transform: scale(1.15);
    z-index: 10;
  }
  .price-marker .tooltip {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #FFFFFF;
    color: #5A7A95;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(90, 122, 149, 0.2);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    font-family: Georgia, serif;
  }
  .price-marker:hover .tooltip { opacity: 1; }

  .controls {
    margin-top: 32px;
    width: 100%;
    max-width: 720px;
    text-align: center;
  }
  .slider-label {
    font-size: 16px;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .slider-value {
    font-size: 28px;
    font-weight: 600;
    color: #8B4A5C;
    margin-bottom: 8px;
  }
  input[type="range"] {
    width: 100%;
    max-width: 500px;
    accent-color: #E89BAB;
  }
  .marker-count {
    margin-top: 12px;
    font-size: 14px;
    opacity: 0.7;
  }

  .averages {
    margin-top: 32px;
    display: flex;
    gap: 40px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .avg-card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 20px 32px;
    min-width: 180px;
    box-shadow: 0 4px 16px rgba(90, 122, 149, 0.1);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .avg-card .icon { width: 48px; height: 48px; }
  .avg-card .label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .avg-card .value {
    font-size: 28px;
    font-weight: 600;
    color: #8B4A5C;
    font-variant-numeric: tabular-nums;
  }
</style>

    activeMarkers.forEach(m => m.remove());
    activeMarkers = [];

    const cafes = getCafesForYear(year);

    for (const cafe of cafes) {
      const coords = PLACE_COORDS[cafe.placeId];
      if (!coords) {
        console.warn('No coords for', cafe.placeId, cafe.name);
        continue;
      }

      // Matcha marker (offset slightly west so it doesn't overlap coffee)
      if (cafe.matcha != null) {
        const el = makeMarkerEl(matchaMarkerSVG, cafe.matcha, cafe.name);
        const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
          .setLngLat([coords[0] - 0.0002, coords[1]])
          .addTo(map);
        activeMarkers.push(marker);
      }

      // Coffee marker (offset slightly east)
      if (cafe.coffee != null) {
        const el = makeMarkerEl(coffeeMarkerSVG, cafe.coffee, cafe.name);
        const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
          .setLngLat([coords[0] + 0.0002, coords[1]])
          .addTo(map);
        activeMarkers.push(marker);
      }
    }

    // Averages and counts
    const matchaPrices = cafes.map(c => c.matcha).filter(p => p != null);
    const coffeePrices = cafes.map(c => c.coffee).filter(p => p != null);
    const avg = arr => arr.length
      ? `$${(arr.reduce((s, p) => s + p, 0) / arr.length).toFixed(2)}`
      : '$—';

    document.getElementById('avgMatcha').textContent = avg(matchaPrices);
    document.getElementById('avgCoffee').textContent = avg(coffeePrices);
    document.getElementById('markerCount').textContent =
      `${cafes.length} cafés · ${matchaPrices.length} matcha · ${coffeePrices.length} coffee`;
  }

  // Slider wiring
  const slider = document.getElementById('yearSlider');
  const yearValue = document.getElementById('yearValue');

  slider.addEventListener('input', () => {
    const year = parseInt(slider.value, 10);
    yearValue.textContent = year;
    render(year);
  });

  // Wait for map style to load before adding markers
  map.on('load', () => {
    render(parseInt(slider.value, 10));
  });
</script>

</body>
</html>
