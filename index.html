  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: #EFF4F9;
    font-family: Georgia, 'Times New Roman', serif;
    color: #5A7A95;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    font-size: 36px;
    font-weight: 500;
    letter-spacing: 4px;
    margin: 0 0 8px 0;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.7;
    margin-bottom: 32px;
  }

  .map-container {
    position: relative;
    width: 100%;
    max-width: 720px;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(90, 122, 149, 0.15);
  }
  .map-background { width: 100%; height: 100%; display: block; }
  .marker-layer { position: absolute; inset: 0; pointer-events: none; }
  .marker-layer .marker {
    position: absolute;
    width: 70px;
    transform: translate(-50%, -85%);
    transition: transform 0.3s ease, opacity 0.3s ease;
    pointer-events: auto;
    cursor: pointer;
  }
  .marker:hover {
    transform: translate(-50%, -85%) scale(1.15);
    z-index: 10;
  }
  .marker .tooltip {
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: #FFFFFF;
    color: #5A7A95;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(90, 122, 149, 0.2);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .marker:hover .tooltip { opacity: 1; }

  .controls {
    margin-top: 32px;
    width: 100%;
    max-width: 720px;
    text-align: center;
  }
  .slider-label {
    font-size: 16px;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .slider-value {
    font-size: 28px;
    font-weight: 600;
    color: #8B4A5C;
    margin-bottom: 8px;
  }
  input[type="range"] {
    width: 100%;
    max-width: 500px;
    accent-color: #E89BAB;
  }
  .marker-count {
    margin-top: 12px;
    font-size: 14px;
    opacity: 0.7;
  }

  .averages {
    margin-top: 32px;
    display: flex;
    gap: 40px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .avg-card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 20px 32px;
    min-width: 180px;
    box-shadow: 0 4px 16px rgba(90, 122, 149, 0.1);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .avg-card .icon { width: 48px; height: 48px; }
  .avg-card .label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .avg-card .value {
    font-size: 28px;
    font-weight: 600;
    color: #8B4A5C;
    font-variant-numeric: tabular-nums;
  }
</style>

      <path d="M 52 35 Q 50 28 54 22 Q 58 16 54 10" fill="none" stroke="#B8D4EB" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <path d="M 62 35 Q 60 28 64 22 Q 68 16 64 10" fill="none" stroke="#B8D4EB" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <circle cx="80" cy="25" r="22" fill="#FFD4DC" stroke="#E89BAB" stroke-width="2"/>
      <text x="80" y="25" font-family="Georgia, serif" font-size="11" font-weight="600"
            fill="#8B4A5C" text-anchor="middle" dominant-baseline="central">${price}</text>
    </svg>
  `;

  const coffeeMarkerSVG = (price) => `
    <svg viewBox="0 0 110 120" xmlns="http://www.w3.org/2000/svg">
      <path d="M 25 50 L 30 95 Q 30 100 35 100 L 65 100 Q 70 100 70 95 L 75 50 Z"
            fill="#FFFFFF" stroke="#5C3A1E" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M 28 70 L 72 70 L 70 82 L 30 82 Z"
            fill="#C89070" stroke="#5C3A1E" stroke-width="2" stroke-linejoin="round"/>
      <ellipse cx="50" cy="50" rx="25" ry="5" fill="#3D2817" stroke="#5C3A1E" stroke-width="2.5"/>
      <ellipse cx="50" cy="50" rx="21" ry="3.5" fill="#4A2C18"/>
      <ellipse cx="50" cy="49" rx="15" ry="1.5" fill="#9B6B47" opacity="0.6"/>
      <path d="M 42 35 Q 40 28 44 22 Q 48 16 44 10" fill="none" stroke="#B8D4EB" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <path d="M 52 35 Q 50 28 54 22 Q 58 16 54 10" fill="none" stroke="#B8D4EB" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <path d="M 62 35 Q 60 28 64 22 Q 68 16 64 10" fill="none" stroke="#B8D4EB" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <circle cx="80" cy="25" r="22" fill="#FFD4DC" stroke="#E89BAB" stroke-width="2"/>
      <text x="80" y="25" font-family="Georgia, serif" font-size="11" font-weight="600"
            fill="#8B4A5C" text-anchor="middle" dominant-baseline="central">${price}</text>
    </svg>
  `;

  // ============================================================
  // Layout: blue zones (avoid the roads), no-overlap placement
  // ============================================================
  const BLUE_ZONES = [
    { xMin: 8, xMax: 38, yMin: 14, yMax: 40 },
    { xMin: 62, xMax: 92, yMin: 14, yMax: 40 },
    { xMin: 8, xMax: 38, yMin: 62, yMax: 92 },
    { xMin: 62, xMax: 92, yMin: 62, yMax: 92 },
  ];
  const MIN_DISTANCE = 11;

  function distance(a, b) {
    return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
  }

  // Seeded "random" so each cafe always lands in the same spot.
  // Uses placeId as the seed so positions are stable across renders.
  function hashString(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) {
      h = ((h << 5) - h) + s.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }
  function seededRandom(seed) {
    // Simple LCG — good enough for picking positions
    let s = seed;
    return () => {
      s = (s * 9301 + 49297) % 233280;
      return s / 233280;
    };
  }

  function positionForPlace(placeId, existingPositions) {
    // Pick a zone deterministically based on the placeId
    const rand = seededRandom(hashString(placeId));
    const zoneIdx = Math.floor(rand() * BLUE_ZONES.length);
    const zone = BLUE_ZONES[zoneIdx];

    // Try up to 50 seeded "random" positions in that zone
    let best = null, bestDist = -Infinity;
    for (let i = 0; i < 50; i++) {
      const candidate = {
        x: zone.xMin + rand() * (zone.xMax - zone.xMin),
        y: zone.yMin + rand() * (zone.yMax - zone.yMin),
      };
      if (existingPositions.length === 0) return candidate;
      const minDist = Math.min(...existingPositions.map(p => distance(candidate, p)));
      if (minDist >= MIN_DISTANCE) return candidate;
      if (minDist > bestDist) {
        bestDist = minDist;
        best = candidate;
      }
    }
    return best;
  }

  // ============================================================
  // For a given year: find the most recent observation per cafe
  // whose observation date is <= end of that year.
  // ============================================================
  function getCafesForYear(year) {
    // Group observations by placeId, keep only the latest one <= year-end
    const cutoff = `${year}-12-31`;
    const latestByPlace = new Map();

    for (const row of PRICE_DATA) {
      if (row.date > cutoff) continue;  // observation is in the future
      const existing = latestByPlace.get(row.placeId);
      if (!existing || row.date > existing.date) {
        latestByPlace.set(row.placeId, row);
      }
    }
    return Array.from(latestByPlace.values());
  }

  // ============================================================
  // Render
  // ============================================================
  function render(year) {
    const cafes = getCafesForYear(year);
    const layer = document.getElementById('markerLayer');
    layer.innerHTML = '';

    const placedPositions = [];

    // We render TWO markers per cafe (matcha + coffee) if both exist.
    // Pre-compute total to place them all without overlap.
    const allMarkers = [];
    for (const cafe of cafes) {
      if (cafe.matcha != null) {
        allMarkers.push({ cafe, type: 'matcha', price: cafe.matcha, seedKey: cafe.placeId + '_m' });
      }
      if (cafe.coffee != null) {
        allMarkers.push({ cafe, type: 'coffee', price: cafe.coffee, seedKey: cafe.placeId + '_c' });
      }
    }

    for (const m of allMarkers) {
      const pos = positionForPlace(m.seedKey, placedPositions);
      if (!pos) continue;
      placedPositions.push(pos);

      const div = document.createElement('div');
      div.className = 'marker';
      div.style.left = `${pos.x}%`;
      div.style.top = `${pos.y}%`;
      const priceLabel = `$${m.price.toFixed(2)}`;
      div.innerHTML = (m.type === 'matcha' ? matchaMarkerSVG(priceLabel) : coffeeMarkerSVG(priceLabel))
        + `<div class="tooltip">${m.cafe.name}</div>`;
      layer.appendChild(div);
    }

    // Counts and averages
    const matchaPrices = cafes.map(c => c.matcha).filter(p => p != null);
    const coffeePrices = cafes.map(c => c.coffee).filter(p => p != null);
    const avg = arr => arr.length
      ? `$${(arr.reduce((s, p) => s + p, 0) / arr.length).toFixed(2)}`
      : '$—';

    document.getElementById('avgMatcha').textContent = avg(matchaPrices);
    document.getElementById('avgCoffee').textContent = avg(coffeePrices);
    document.getElementById('markerCount').textContent =
      `${cafes.length} cafés · ${matchaPrices.length} matcha · ${coffeePrices.length} coffee`;
  }

  // ============================================================
  // Wire up the slider
  // ============================================================
  const slider = document.getElementById('yearSlider');
  const yearValue = document.getElementById('yearValue');

  slider.addEventListener('input', () => {
    const year = parseInt(slider.value, 10);
    yearValue.textContent = year;
    render(year);
  });

  render(parseInt(slider.value, 10));
</script>

</body>
